<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DharaVeda - Under Construction</title>
    <link rel="icon" href="Pic/0Logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #FDF7EC;
            --text-primary: #1E2A1F;
            --text-secondary: #555555;
            --accent-orange: #F2994A;
            --accent-green: #3B6B3F;
            --font-family: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('Pic/home.png');
            background-size: cover;
            background-position: center top;
            z-index: -1;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .error-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .error-img {
            width: 160px;
            height: auto;
            max-width: 100%;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-orange);
            margin-bottom: 8px;
        }

        .error-text {
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .back-btn {
            margin-top: 10px;
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-family);
            box-shadow: 0 4px 15px rgba(59, 107, 63, 0.3);
            transition: transform 0.2s;
        }

        .back-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="error-card">
        <img src="Pic/error.png" alt="Under Construction" class="error-img" onerror="this.src='Pic/0Logo.png'; this.style.opacity='0.5';">
        <div>
            <h2 class="error-title">Coming Soon</h2>
            <p class="error-text" id="error-message">User, This feature is under construction and will be available soon.</p>
        </div>
        <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const userDataStr = localStorage.getItem('dharaveda_user');
        if (userDataStr) {
            try {
                const userData = JSON.parse(userDataStr);
                if (userData && userData.name) {
                    const firstName = userData.name.split(' ')[0];
                    const msgEl = document.getElementById('error-message');
                    msgEl.textContent = `${firstName}, This feature is under construction and will be available soon.`;
                }
            } catch (e) {
                console.error("Error parsing user data");
            }
        }
    });
</script>

</body>
</html>
