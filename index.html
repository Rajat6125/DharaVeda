<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DharaVeda - Cultivating Smarter Agricultural Approaches</title>
    <link rel="icon" href="Pic/0Logo.png" type="image/png">
    <style>
        :root {
            --bg-color: #FDF7EC;
            --text-primary: #333333;
            --text-secondary: #555555;
            --accent-orange: #E68A2E;
            --accent-green: #3B6B3F;
            --input-border: #D1BFAe;
            --font-family: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .background-wrapper {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            width: 100%;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .background-landscape {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23e8dec9" fill-opacity="0.5" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,181.3C960,181,1056,235,1152,234.7C1248,235,1344,181,1392,154.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover;
            background-position: bottom;
            z-index: 0;
            opacity: 0.8;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px 40px 20px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            flex-grow: 1;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .sign-in-prompt {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .sign-in-link {
            color: var(--accent-orange);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .sign-in-link i {
            font-size: 12px;
        }

        main {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            justify-content: space-evenly;
            gap: 24px;
            padding-bottom: 20px;
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo {
            max-width: 100%;
            height: auto;
            object-fit: contain;
            max-height: 35vh;
            min-height: 120px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 16px;
            width: 100%;
        }

        .decoration-line {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 8px 0;
            color: var(--accent-green);
        }

        .decoration-line::before,
        .decoration-line::after {
            content: "";
            height: 1px;
            width: 40px;
            background-color: var(--input-border);
            margin: 0 10px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .text-accent {
            color: var(--accent-green);
            font-size: 14px;
        }

        .subtitle {
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 30px;
            max-width: 90%;
        }

        .signup-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-green);
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            background-color: transparent;
            font-family: var(--font-family);
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent-green);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-orange);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: var(--font-family);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn-primary:hover {
            background-color: #CC7A29;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-wrapper">
        <div class="background-landscape"></div>
        <div class="container">
            <header>
                <div class="sign-in-prompt">
                    <span>Already have an account?</span>
                    <a href="login.html" class="sign-in-link">Sign In <i class="fa-solid fa-arrow-right"></i></a>
                </div>
            </header>

            <main>
                <div class="logo-container">
                    <img src="Pic/0Logo.png" alt="DharaVeda Logo" class="logo">
                </div>

                <div class="title-container">
                    <div class="decoration-line">
                        <i class="fa-solid fa-leaf text-accent"></i>
                    </div>
                    <h1>Cultivating Smarter<br>Agricultural Approaches</h1>
                    <div class="decoration-line">
                        <i class="fa-solid fa-leaf text-accent"></i>
                    </div>
                </div>

                <p class="subtitle">
                    AI-powered agricultural insights, crop recommendations, and smart farming decisions.
                </p>

                <form class="signup-form" id="verify-form">
                    <div class="input-group">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="text" placeholder="Enter your email or phone number" required>
                    </div>
                    <button type="submit" class="btn-primary">
                        Get Started <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>


            </main>
        </div>
    </div>
    <script>
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5000'
            : 'https://dharaveda.onrender.com';

        document.getElementById('verify-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const emailPhone = document.querySelector('.signup-form input').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email_phone: emailPhone })
                });
                
                const data = await response.json();
                
                if (data.exists) {
                    window.location.href = `login.html?email=${encodeURIComponent(emailPhone)}`;
                } else {
                    window.location.href = `register.html?email=${encodeURIComponent(emailPhone)}`;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while verifying the user. Make sure the backend is running.');
            }
        });
    </script>
</body>
</html>
