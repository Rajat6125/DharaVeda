<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DharaVeda - Login</title>
    <link rel="icon" href="Pic/0Logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #FDF7EC;
            --text-primary: #333333;
            --text-secondary: #555555;
            --accent-orange: #E68A2E;
            --accent-green: #3B6B3F;
            --input-border: #D1BFAe;
            --font-family: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('Pic/login.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        /* Dark gradient overlay to ensure text readability against any part of the image */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.7));
            z-index: 1;
        }

        .login-container {
            background: rgba(0, 0, 0, 0.611); /* Darker and more translucent background */
            backdrop-filter: blur(2x);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 32px;
            width: 90%;
            max-width: 420px;
            z-index: 2;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
        }

        .logo-container img {
            height: 70px;
            width: auto;
            object-fit: contain;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: #dddddd;
            font-size: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-green);
            font-size: 18px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background-color: rgba(0, 0, 0, 0.3);
            font-family: var(--font-family);
            font-size: 15px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .input-wrapper input:focus {
            border-color: var(--accent-green);
            background-color: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(59, 107, 63, 0.3);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #dddddd;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            accent-color: var(--accent-green);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--accent-orange);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #CC7A29;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: var(--font-family);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s, transform 0.1s, box-shadow 0.3s;
            box-shadow: 0 4px 12px rgba(59, 107, 63, 0.3);
            margin-top: 8px;
        }

        .btn-login:hover {
            background-color: #2D5230;
            box-shadow: 0 6px 16px rgba(59, 107, 63, 0.4);
        }

        .btn-login:active {
            transform: scale(0.98);
        }


        .signup-prompt {
            text-align: center;
            font-size: 14px;
            color: #dddddd;
            margin-top: 8px;
        }

        .signup-prompt a {
            color: var(--accent-orange);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: color 0.3s;
        }
        
        .signup-prompt a:hover {
            color: #CC7A29;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <img src="Pic/0Logo.png" alt="DharaVeda Logo">
        </div>
        
        <div class="header">
            <h1>Welcome Back</h1>
            <p>Sign in to continue your journey</p>
        </div>

        <form class="form-group" id="login-form">
            <div class="input-wrapper">
                <i class="fa-regular fa-envelope"></i>
                <input type="text" placeholder="Email or Phone Number" id="login-email" required>
            </div>
            
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>

            <div class="options">
                <label class="remember-me">
                    <input type="checkbox">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login">
                Sign In <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>


        <div class="signup-prompt">
            Don't have an account? <a href="register.html">Sign Up</a>
        </div>
    </div>

    <script>
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5000'
            : 'https://dharaveda.onrender.com';

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            const emailInput = document.getElementById('login-email');
            
            if (emailParam && emailInput) {
                emailInput.value = emailParam;
            }
        });

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const emailPhone = document.getElementById('login-email').value;
            const password = document.querySelector('input[type="password"]').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email_phone: emailPhone, password: password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    if (data.token) {
                        localStorage.setItem('dharaveda_token', data.token);
                        localStorage.setItem('dharaveda_user', JSON.stringify(data.user));
                    }
                    window.location.href = 'home.html';
                } else {
                    alert(data.message || 'Login failed. Please check your credentials.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during login. Make sure the backend is running.');
            }
        });
    </script>
</body>
</html>
